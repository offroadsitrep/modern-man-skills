<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img">
<rect width="800" height="380" fill="#f3eee4"/>
<rect x="2" y="2" width="796" height="376" fill="none" stroke="#1c1815" stroke-width="2"/>
<text x="36" y="38" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="900" letter-spacing="3.5" fill="#b8792f">HONEST TALK</text>
<line x1="36" y1="48" x2="135" y2="48" stroke="#b8792f" stroke-width="2.5"/>
<text x="36" y="88" font-family="Georgia, serif" font-size="40" font-weight="800" fill="#1c1815" letter-spacing="-1.2">Three faces</text>
<text x="36" y="132" font-family="Georgia, serif" font-size="40" font-weight="800" fill="#1c1815" letter-spacing="-1.2">of AI anxiety.</text>
<text x="36" y="182" font-family="Georgia, serif" font-style="italic" font-size="18" fill="#6b6055">Name it. Then deal with it like adults.</text>
<g font-family="Helvetica Neue, Arial, sans-serif">
<text x="36" y="244" font-family="Georgia, serif" font-size="32" font-weight="800" fill="#b8792f">01</text>
<text x="92" y="232" font-size="11" font-weight="800" fill="#9a8a72" letter-spacing="2.5">FALLING BEHIND</text>
<text x="92" y="252" font-size="19" font-weight="700" fill="#1c1815">Everyone seems to get it already</text>
<text x="36" y="288" font-family="Georgia, serif" font-size="32" font-weight="800" fill="#b8792f">02</text>
<text x="92" y="276" font-size="11" font-weight="800" fill="#9a8a72" letter-spacing="2.5">LOSING WORK</text>
<text x="92" y="296" font-size="19" font-weight="700" fill="#1c1815">Will my career still matter?</text>
<text x="36" y="332" font-family="Georgia, serif" font-size="32" font-weight="800" fill="#b8792f">03</text>
<text x="92" y="320" font-size="11" font-weight="800" fill="#9a8a72" letter-spacing="2.5">LOSING SELF</text>
<text x="92" y="340" font-size="19" font-weight="700" fill="#1c1815">Am I still the one thinking?</text>
</g>
<line x1="36" y1="344" x2="100" y2="344" stroke="#d6cfbf" stroke-width="1"/>
<text x="36" y="362" font-family="Georgia, serif" font-style="italic" font-size="13" fill="#6b6055">All three are real. None are fatal.</text>
</svg>