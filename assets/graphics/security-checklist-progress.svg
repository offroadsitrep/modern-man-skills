<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-label="60-minute security tune-up timeline">
  <rect width="800" height="380" fill="#f3eee4"/>
  <rect x="2" y="2" width="796" height="376" fill="none" stroke="#1c1815" stroke-width="2"/>

  <line x1="36" y1="48" x2="200" y2="48" stroke="#b8792f" stroke-width="2.5"/>
  <text x="36" y="38" font-family="Helvetica Neue, Arial" font-size="13" font-weight="900" letter-spacing="3.5" fill="#b8792f">SECURITY · ONE SATURDAY</text>
  <text x="36" y="78" font-family="Georgia, serif" font-size="32" font-weight="800" fill="#1c1815" letter-spacing="-.8">Sixty minutes. Six moves.</text>
  <text x="36" y="100" font-family="Georgia, serif" font-style="italic" font-size="15" fill="#6b6055">Real protection. The hour that pays off.</text>

  <!-- Timeline track -->
  <line x1="80" y1="200" x2="720" y2="200" stroke="#1c1815" stroke-width="2"/>
  <text x="80" y="232" font-family="Helvetica Neue, Arial" font-size="11" font-weight="700" fill="#6b6055" text-anchor="middle">0 min</text>
  <text x="720" y="232" font-family="Helvetica Neue, Arial" font-size="11" font-weight="700" fill="#6b6055" text-anchor="middle">60 min</text>

  <!-- Steps -->
  <g font-family="Helvetica Neue, Arial" font-weight="900">
    <g transform="translate(80,200)">
      <circle cx="0" cy="0" r="16" fill="#b8792f" stroke="#1c1815" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-size="13" fill="#fff">1</text>
      <text x="0" y="-58" font-size="11" fill="#1c1815" letter-spacing="1.5" text-anchor="middle">PASSWORD</text>
      <text x="0" y="-42" font-size="11" fill="#1c1815" letter-spacing="1.5" text-anchor="middle">MANAGER</text>
      <text x="0" y="48" font-family="Georgia, serif" font-size="14" fill="#b8792f" text-anchor="middle">10 min</text>
    </g>
    <g transform="translate(208,200)">
      <circle cx="0" cy="0" r="16" fill="#b8792f" stroke="#1c1815" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-size="13" fill="#fff">2</text>
      <text x="0" y="-58" font-size="11" fill="#1c1815" letter-spacing="1.5" text-anchor="middle">2-FACTOR</text>
      <text x="0" y="-42" font-size="11" fill="#1c1815" letter-spacing="1.5" text-anchor="middle">ON EMAIL</text>
      <text x="0" y="48" font-family="Georgia, serif" font-size="14" fill="#b8792f" text-anchor="middle">10 min</text>
    </g>
    <g transform="translate(336,200)">
      <circle cx="0" cy="0" r="16" fill="#b8792f" stroke="#1c1815" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-size="13" fill="#fff">3</text>
      <text x="0" y="-58" font-size="11" fill="#1c1815" letter-spacing="1.5" text-anchor="middle">CREDIT</text>
      <text x="0" y="-42" font-size="11" fill="#1c1815" letter-spacing="1.5" text-anchor="middle">FREEZE</text>
      <text x="0" y="48" font-family="Georgia, serif" font-size="14" fill="#b8792f" text-anchor="middle">10 min</text>
    </g>
    <g transform="translate(464,200)">
      <circle cx="0" cy="0" r="16" fill="#b8792f" stroke="#1c1815" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-size="13" fill="#fff">4</text>
      <text x="0" y="-58" font-size="11" fill="#1c1815" letter-spacing="1.5" text-anchor="middle">PHONE PIN</text>
      <text x="0" y="-42" font-size="11" fill="#1c1815" letter-spacing="1.5" text-anchor="middle">SIM LOCK</text>
      <text x="0" y="48" font-family="Georgia, serif" font-size="14" fill="#b8792f" text-anchor="middle">10 min</text>
    </g>
    <g transform="translate(592,200)">
      <circle cx="0" cy="0" r="16" fill="#b8792f" stroke="#1c1815" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-size="13" fill="#fff">5</text>
      <text x="0" y="-58" font-size="11" fill="#1c1815" letter-spacing="1.5" text-anchor="middle">BACKUPS</text>
      <text x="0" y="-42" font-size="11" fill="#1c1815" letter-spacing="1.5" text-anchor="middle">VERIFIED</text>
      <text x="0" y="48" font-family="Georgia, serif" font-size="14" fill="#b8792f" text-anchor="middle">10 min</text>
    </g>
    <g transform="translate(720,200)">
      <circle cx="0" cy="0" r="16" fill="#b8792f" stroke="#1c1815" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-size="13" fill="#fff">6</text>
      <text x="0" y="-58" font-size="11" fill="#1c1815" letter-spacing="1.5" text-anchor="middle">RECOVERY</text>
      <text x="0" y="-42" font-size="11" fill="#1c1815" letter-spacing="1.5" text-anchor="middle">PLAN</text>
      <text x="0" y="48" font-family="Georgia, serif" font-size="14" fill="#b8792f" text-anchor="middle">10 min</text>
    </g>
  </g>

  <line x1="36" y1="344" x2="100" y2="344" stroke="#d6cfbf" stroke-width="1"/>
  <text x="36" y="362" font-family="Georgia, serif" font-style="italic" font-size="13" fill="#6b6055">Don't be the easy target. That's the whole point.</text>
</svg>
